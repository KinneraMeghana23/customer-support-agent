<!DOCTYPE html>
<html>
<head>
  <title>Bulk Email Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 25px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
    }

    input, select, textarea {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .tabs {
      display: flex;
      margin-bottom: 15px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
    }

    .active {
      background: #00c6ff;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📧 Bulk Email System</h2>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('send')">Send Now</div>
    <div class="tab" onclick="showTab('schedule')">Schedule</div>
  </div>

  <!-- SEND FORM -->
  <form id="send" action="/send-bulk" method="post" enctype="multipart/form-data">

    <input type="file" name="file" required>

    <input type="text" name="subject" placeholder="Subject">

    <select name="type">
      <option value="announcement">📢 Announcement</option>
      <option value="meeting">📅 Meeting</option>
      <option value="holiday">🎉 Holiday</option>
    </select>

    <textarea name="message" placeholder="Message"></textarea>

    <!-- 📎 ATTACHMENT -->
    <label>Attach File (PDF/Image/Word)</label>
    <input type="file" name="attachment">

    <button type="submit">🚀 Send Emails</button>
  </form>


  <!-- SCHEDULE FORM -->
  <form id="schedule" class="hidden" action="/schedule" method="post" enctype="multipart/form-data">

    <input type="file" name="file" required>

    <input type="text" name="subject" placeholder="Subject">

    <select name="type">
      <option value="announcement">📢 Announcement</option>
      <option value="meeting">📅 Meeting</option>
      <option value="holiday">🎉 Holiday</option>
    </select>

    <textarea name="message" placeholder="Message"></textarea>

    <!-- 📎 ATTACHMENT -->
    <input type="file" name="attachment">

    <!-- ⏳ SCHEDULING -->
    <label>Schedule Time</label>
    <input type="datetime-local" name="time">

    <button type="submit">⏳ Schedule Emails</button>
  </form>

</div>

<script>
function showTab(tab) {
  document.getElementById("send").classList.add("hidden");
  document.getElementById("schedule").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");

  let tabs = document.querySelectorAll(".tab");
  tabs.forEach(t => t.classList.remove("active"));

  event.target.classList.add("active");
}
</script>

</body>
</html>

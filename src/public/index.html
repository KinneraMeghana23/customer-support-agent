<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #1e293b;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      text-align: center;
    }

    .menu {
      margin-top: 30px;
    }

    .menu div {
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .menu div:hover, .active {
      background: #3b82f6;
    }

    /* Main */
    .main {
      flex: 1;
      background: #f1f5f9;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input, select, textarea {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>📧 Admin</h2>

  <div class="menu">
    <div class="active" onclick="show('send', this)">Send Email</div>
    <div onclick="show('schedule', this)">Schedule</div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- SEND -->
  <div id="send" class="card">
    <h3>Send Bulk Email</h3>

    <form action="/send-bulk" method="post" enctype="multipart/form-data">
      <input type="file" name="file" required>

      <input type="text" name="subject" placeholder="Subject">

      <select name="type">
        <option value="announcement">Announcement</option>
        <option value="meeting">Meeting</option>
        <option value="holiday">Holiday</option>
      </select>

      <textarea name="message" placeholder="Message"></textarea>

      <label>Attachment</label>
      <input type="file" name="attachment">

      <button>Send Emails</button>
    </form>
  </div>

  <!-- SCHEDULE -->
  <div id="schedule" class="card hidden">
    <h3>Schedule Emails</h3>

    <form action="/schedule" method="post" enctype="multipart/form-data">
      <input type="file" name="file" required>

      <input type="text" name="subject" placeholder="Subject">

      <select name="type">
        <option value="announcement">Announcement</option>
        <option value="meeting">Meeting</option>
        <option value="holiday">Holiday</option>
      </select>

      <textarea name="message" placeholder="Message"></textarea>

      <input type="file" name="attachment">

      <label>Schedule Time</label>
      <input type="datetime-local" name="time">

      <button>Schedule Emails</button>
    </form>
  </div>

</div>

<script>
function show(id, el) {
  document.getElementById("send").classList.add("hidden");
  document.getElementById("schedule").classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".menu div").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
}
</script>

</body>
</html>

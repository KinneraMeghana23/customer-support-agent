<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI";
      display: flex;
      height: 100vh;
      background: #f1f5f9;
    }

    .sidebar {
      width: 240px;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .menu div {
      padding: 10px;
      cursor: pointer;
      border-radius: 6px;
      margin: 5px 0;
    }

    .menu div:hover, .active {
      background: #3b82f6;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .content {
      padding: 20px;
      overflow: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    input, textarea, select {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      cursor: pointer;
    }

    .hidden { display: none; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>📧 Admin</h2>
  <div class="menu">
    <div class="active" onclick="show('dashboard', this)">Dashboard</div>
    <div onclick="show('send', this)">Send</div>
    <div onclick="show('schedule', this)">Schedule</div>
    <div onclick="show('history', this)">History</div>
  </div>
</div>

<div class="main">

  <div class="topbar">
    <span>Welcome</span>
    <a href="/logout">Logout</a>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div id="dashboard">

      <div class="grid">
        <div class="card">📧 Total Campaigns: <span id="campaigns">0</span></div>
        <div class="card">📨 Emails Sent: <span id="emails">0</span></div>
        <div class="card">📅 Today: Active</div>
      </div>

      <div class="card">
        <canvas id="chart"></canvas>
      </div>

    </div>

    <!-- SEND -->
    <div id="send" class="hidden card">
      <h3>Send Emails</h3>
      <form onsubmit="sendForm(event)" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <input name="subject" placeholder="Subject">
        <textarea name="message"></textarea>
        <input type="file" name="attachment">
        <button>Send</button>
      </form>
    </div>

    <!-- SCHEDULE -->
    <div id="schedule" class="hidden card">
      <h3>Schedule</h3>
      <form action="/schedule" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <input name="subject">
        <textarea name="message"></textarea>
        <input type="datetime-local" name="time">
        <button>Schedule</button>
      </form>
    </div>

    <!-- HISTORY -->
    <div id="history" class="hidden card">
      <h3>Email History</h3>
      <button onclick="loadHistory()">Load</button>
      <ul id="historyList"></ul>
    </div>

  </div>
</div>

<div class="toast" id="toast">Success!</div>

<script>
function show(id, el){
  document.querySelectorAll(".content > div").forEach(d => d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".menu div").forEach(d => d.classList.remove("active"));
  el.classList.add("active");
}

// 🔔 Toast
function toast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none", 2000);
}

// 📧 SEND FORM (AJAX)
async function sendForm(e){
  e.preventDefault();

  const form = new FormData(e.target);

  const res = await fetch("/send-bulk", {
    method: "POST",
    body: form
  });

  const text = await res.text();
  toast(text);

  loadAnalytics();
}

// 📊 ANALYTICS
async function loadAnalytics(){
  const res = await fetch("/analytics");
  const data = await res.json();

  document.getElementById("campaigns").innerText = data.totalCampaigns;
  document.getElementById("emails").innerText = data.totalEmails;

  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Campaigns", "Emails"],
      datasets: [{
        data: [data.totalCampaigns, data.totalEmails]
      }]
    }
  });
}

// 📜 HISTORY
async function loadHistory(){
  const res = await fetch("/history");
  const data = await res.json();

  const list = document.getElementById("historyList");
  list.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");
    li.innerText = `${item.subject} - ${item.count}`;
    list.appendChild(li);
  });
}

loadAnalytics();
</script>

</body>
</html>
